name: Test

on:
  push:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create SSH agent socket placeholder
        run: mkdir -p ~/.ssh && touch ~/.ssh/agent.sock

      - name: Create gh config placeholder
        run: mkdir -p ~/.config/gh

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests inside dev container
        uses: devcontainers/ci@v0.3
        with:
          imageName: ghcr.io/${{ github.repository_owner }}/my-website-devcontainer
          cacheFrom: ghcr.io/${{ github.repository_owner }}/my-website-devcontainer
          runCmd: .devcontainer/postCreate.sh && npm ci && npm run check && npm run lint && npm run build
          push: never
